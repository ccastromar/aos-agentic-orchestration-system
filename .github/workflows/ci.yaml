name: CI Pipeline

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: [ '1.24' ]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache: true

    - name: Install Dependencies
      run: go mod download

    - name: Set Build Variables
      id: vars
      run: |
        echo "COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
        echo "DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV
        echo "VERSION=${GITHUB_REF_NAME:-dev}" >> $GITHUB_ENV

    - name: Run Tests
      run: go test -v -race ./...

    - name: Build macOS (ARM64 / Apple Silicon)
      env:
        GOOS: darwin
        GOARCH: arm64
      run: go build -v -ldflags="-X 'main.version=${{ env.VERSION }}' -X 'main.commit=${{ env.COMMIT }}' -X 'main.date=${{ env.DATE }}'" -o aos-macos-arm64 ./cmd/aos

    - name: Build macOS (Intel)
      env:
        GOOS: darwin
        GOARCH: amd64
      run: go build -v -ldflags="-X 'main.version=${{ env.VERSION }}' -X 'main.commit=${{ env.COMMIT }}' -X 'main.date=${{ env.DATE }}'" -o aos-macos-amd64 ./cmd/aos

    - name: Build Linux (AMD64)
      env:
        GOOS: linux
        GOARCH: amd64
      run: go build -v -ldflags="-X 'main.version=${{ env.VERSION }}' -X 'main.commit=${{ env.COMMIT }}' -X 'main.date=${{ env.DATE }}'" -o aos-linux-amd64 ./cmd/aos

    - name: Build Windows (AMD64)
      env:
        GOOS: windows
        GOARCH: amd64
      run: go build -v -ldflags="-X 'main.version=${{ env.VERSION }}' -X 'main.commit=${{ env.COMMIT }}' -X 'main.date=${{ env.DATE }}'" -o aos-windows-amd64.exe ./cmd/aos

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: aos-binaries
        path: |
          aos-macos-arm64
          aos-macos-amd64
          aos-linux-amd64
          aos-windows-amd64.exe

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: aos-binaries
        path: .

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          aos-macos-arm64
          aos-macos-amd64
          aos-linux-amd64
          aos-windows-amd64.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
