intents:
  - type: devops.get_service_status
    description: "Get service status"
    pipeline: pipeline_service_status
    required_params:
      - serviceName

  - type: devops.restart_service
    description: "Restart a service"
    pipeline: pipeline_restart_service
    required_params:
      - serviceName
    allow_dangerous: true

  - type: devops.deploy_service
    description: "Deploy a service"
    pipeline: pipeline_deploy_service
    required_params:
      - serviceName
      - version
    allow_dangerous: true

  - type: devops.tail_logs
    description: "Query last logs of a service"
    pipeline: pipeline_tail_logs
    required_params:
      - serviceName
      - lines
