intents:
  - type: support.create_ticket
    description: "Create a ticket"
    pipeline: pipeline_support_create
    required_params: ["subject", "description", "priority"]

  - type: support.check_ticket_status
    description: "Query ticket status"
    pipeline: pipeline_support_status
    required_params: ["ticketId"]

  - type: support.append_ticket_note
    description: "Add a note to a ticket"
    pipeline: pipeline_support_add_note
    required_params: ["ticketId", "note"]

  - type: support.close_ticket
    description: "Close a ticket"
    pipeline: pipeline_support_close
    required_params: ["ticketId", "reason"]
