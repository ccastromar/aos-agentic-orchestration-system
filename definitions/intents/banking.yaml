intents:
  - type: banking.get_balance
    description: >
      INTENT: "Get account balance"
    pipeline: pipeline_get_balance
    required_params:
      - accountId
    allow_dangerous: false
    requires_amount: false
    requires_phone: false
    max_amount: 0
    shadow_mode: false

  - type: banking.get_credit_card_balance
    description: >
      "Check available credit on the card"
    pipeline: pipeline_check_credit_card
    required_params:
        - cardId
    allow_dangerous: false

  - type: banking.get_movements
    description: >
      INTENT: Transaction list
    pipeline: pipeline_get_movements
    required_params:
      - accountId
    allow_dangerous: false
    requires_amount: false
    requires_phone: false
    max_amount: 0
    shadow_mode: false    

  - type: banking.send_bizum
    description: >
      INTENT: Send a Bizum to someone
    pipeline: pipeline_send_bizum
    required_params:
      - amount
      - toPhone
      - concept
    allow_dangerous: true
    requires_amount: true       # amount
    requires_phone: true        # toPhone
    max_amount: 100              # limit
    shadow_mode: false

  - type: banking.transfer
    description: >
      INTENT: Send a cash transfer
    pipeline: pipeline_cash_transfer
    required_params:
      - amount
      - currency
      - toAccount
      - concept
    allow_dangerous: true
    requires_amount: true
    requires_currency: true
    requires_account: true
    max_amount: 3000
    shadow_mode: false

  - type: banking.send_bitcoin
    description: >
      INTENT: Send bitcoin to an address
    pipeline: pipeline_send_bitcoin
    required_params:
      - amount
      - toAddress
      - concept
    allow_dangerous: true
    requires_amount: true       # amount
    requires_address: true        # toPhone
    max_amount: 100              # limit
    shadow_mode: false