pipelines:
  - name: pipeline_get_balance
    description: "Account balance query"
    steps:
      - tool: banking.core_get_balance
      - analyst: true

  - name: pipeline_get_movements
    description: "Transaction list"
    steps:
      - tool: banking.core_get_movements
      - analyst: true

  - name: pipeline_check_credit_card
    description: "Check available credit on the card"
    steps:
      - tool: banking.core_get_credit_card_balance
      - analyst: true

  - name: pipeline_send_bizum
    description: "Send a Bizum (demo)"
    steps:
      - tool: banking.aml_risk_check
      - tool: banking.payments_bizum_send
      - tool: banking.send_notification
      - analyst: true

  - name: pipeline_cash_transfer
    description: "Send a cash transfer (demo)"
    steps:
      - tool: banking.aml_risk_check
      - tool: banking.payments_transfer
      - human_approval: manager_review
        when: ${amount > 1000}
      - tool: banking.send_notification
      - analyst: true

  - name: pipeline_send_bitcoin
    description: "Send bitcoins"
    steps:
      - tool: banking.aml_risk_check
      - human_approval: manager_review
      - tool: banking.payments_bitcoin_send
      - tool: banking.send_notification
      - analyst: true
