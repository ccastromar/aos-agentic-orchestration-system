pipelines:
  - name: pipeline_crm_profile
    description: "Get client profile"
    steps:
      - tool: crm.get_profile
      - analyst: true

  - name: pipeline_crm_interactions
    description: "Get client's last interactions"
    steps:
      - tool: crm.get_profile
      - tool: crm.get_interactions
      - analyst: true

  - name: pipeline_crm_update_lead_status
    description: "Update lead status"
    steps:
      - tool: crm.update_lead_status
      - analyst: true
