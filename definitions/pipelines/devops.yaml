pipelines:
  - name: pipeline_service_status
    description: "Get service status"
    steps:
      - tool: devops.infra_get_status
        with_params: {}
      - analyst: true

  - name: pipeline_restart_service
    description: "Restart a service"
    steps:
      - tool: devops.infra_restart_service
        with_params: {}
      - tool: devops.infra_get_status
        with_params: {}
      - analyst: true

  - name: pipeline_deploy_service
    description: "Deploy a service"
    steps:
      - tool: devops.infra_deploy_service
        with_params: {}
      - tool: devops.infra_get_status
        with_params: {}
      - analyst: true

  - name: pipeline_tail_logs
    description: "Query logs of the service"
    steps:
      - tool: devops.infra_tail_logs
        with_params: {}
      - analyst: true
