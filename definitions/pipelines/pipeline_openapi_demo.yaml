pipelines:
  - name: pipeline_openapi_demo
    description: "Pipeline to test openapi dynamic tools"
    mode: dag
    steps:
      - id: "step1"
        tool: "testapi.getUser" # Generated from Swagger
        with_params:
          userId: "$.userId"
      
      - id: "step2"
        tool: "testapi.createPost" # Generated from Swagger
        depends_on: ["step1"]
        with_params:
          title: "$.title"
          userId: "$.userId"
