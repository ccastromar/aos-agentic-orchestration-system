pipelines:
  - name: pipeline_support_create
    description: "Create a support ticket"
    steps:
      - tool: helpdesk.support_create_ticket
      - analyst: true

  - name: pipeline_support_status
    description: "Query the status of a ticket"
    steps:
      - tool: helpdesk.support_get_ticket
      - analyst: true

  - name: pipeline_support_add_note
    description: "Add a note to a ticket"
    steps:
      - tool: helpdesk.support_add_note
      - analyst: true

  - name: pipeline_support_close
    description: "Close a ticket"
    steps:
      - tool: helpdesk.support_close_ticket
      - analyst: true
