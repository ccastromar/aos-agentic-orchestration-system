tools:
  - name: devops.infra_get_status
    type: http
    method: GET
    url: "http://localhost:9000/mock/devops/status?service={{ .serviceName }}"
    mode: read
    timeout: 3000
    body: {}

  - name: devops.infra_restart_service
    type: http
    method: POST
    url: "http://localhost:9000/mock/devops/restart"
    mode: dangerous
    timeout: 5000
    body:
      service: "{{ .serviceName }}"

  - name: devops.infra_deploy_service
    type: http
    method: POST
    url: "http://localhost:9000/mock/devops/deploy"
    mode: dangerous
    timeout: 8000
    body:
      service: "{{ .serviceName }}"
      version: "{{ .version }}"

  - name: devops.infra_tail_logs
    type: http
    method: GET
    url: "http://localhost:9000/mock/devops/logs?service={{ .serviceName }}&lines={{ .lines }}"
    mode: read
    timeout: 5000
    body: {}
