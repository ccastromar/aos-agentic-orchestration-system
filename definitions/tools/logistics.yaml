tools:
  - name: logistics.get_customer
    type: http
    method: GET
    url: "http://localhost:9000/mock/logistics/customer?customerId={{ .customerId }}"
    headers:
      Authorization: "Bearer {{ env \"API_KEY\" }}"
    mode: read
    timeout: 3000

  - name: logistics.get_shipment
    type: http
    method: GET
    url: "http://localhost:9000/mock/logistics/shipment?shipmentId={{ .shipmentId }}"
    headers:
      Authorization: "Bearer {{ env \"API_KEY\" }}"
    mode: read
    timeout: 3000
