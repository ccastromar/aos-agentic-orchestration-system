<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AOS – New Task</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 1rem;
            background: #f5f6f8;
        }

        .container {
            max-width: 720px;
            margin: auto;
            background: white;
            padding: 1.2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
        }

        h1 {
            margin-top: 0;
        }

        textarea {
            width: 100%;
            min-height: 140px;
            font-size: 1rem;
            padding: .75rem;
            border-radius: 6px;
            border: 1px solid #ccc;
            resize: vertical;
        }

        select {
            width: 100%;
            padding: .6rem;
            margin-bottom: .8rem;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 1rem;
            width: 100%;
            padding: .9rem;
            font-size: 1.05rem;
            background: #1c7ed6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1864ab;
        }

        .alert {
            background: #ffe5e5;
            color: #a30000;
            padding: .75rem;
            border-radius: 6px;
            margin-bottom: 1rem;
        }

        .back {
            display: inline-block;
            margin-bottom: 1rem;
            text-decoration: none;
            color: #1c7ed6;
        }
    </style>
</head>
<body>

<div class="container">
    <a class="back" href="/ui">&larr; Back</a>

    <h1>New Task</h1>

    {{ if .ErrorMessage }}
    <div class="alert">
        {{ .ErrorMessage }}
    </div>
    {{ end }}

    <form method="POST" action="/ui/ask">
        <label for="lang">Language</label>
        <select name="lang" id="lang">
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
        </select>

        <textarea name="message" placeholder="Write your request to AOS..." required></textarea>
        <button type="submit">Send</button>
    </form>
</div>

</body>
</html>
