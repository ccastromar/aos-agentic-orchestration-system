<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AOS – Task {{ .ID }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 1rem;
            background: #f5f6f8;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .event {
            background: white;
            padding: .8rem;
            border-radius: 6px;
            margin-bottom: .6rem;
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
        }

        .meta {
            font-size: .8rem;
            color: #666;
            margin-bottom: .3rem;
        }

        .status {
            font-size: .9rem;
            color: #555;
            margin-bottom: 1rem;
        }

        .back {
            display: inline-block;
            margin-bottom: 1rem;
            text-decoration: none;
            color: #1c7ed6;
        }
    </style>
</head>
<body>

<div class="container">
    <a class="back" href="/ui">&larr; Back</a>

    <h1>Task {{ .ID }}</h1>

    <div id="status" class="status">
        Running…
    </div>

    <!-- CONTENEDOR CLAVE -->
    <div id="events">
        {{ range .Events }}
        <div class="event">
            <div class="meta">
                {{ .Time.Format "15:04:05" }} · {{ .Agent }} · {{ .Kind }} · {{ .Duration }}
            </div>
            <div>{{ .Message }}</div>
        </div>
        {{ end }}
    </div>
</div>

<script>
    const TASK_ID = "{{ .ID }}";
    let lastCount = {{ len .Events }};
    let polling = true;

    async function pollEvents() {
        if (!polling) return;

        try {
            const res = await fetch(`/ui/task/events?id=${TASK_ID}`);
            if (!res.ok) return;

            const events = await res.json();

            if (events.length !== lastCount) {
                lastCount = events.length;
                renderEvents(events);
                updateStatus(events);
            }
        } catch (e) {
            console.error("poll error", e);
        }
    }

    function renderEvents(events) {
        const container = document.getElementById("events");
        container.innerHTML = "";

        for (const ev of events) {
            const div = document.createElement("div");
            div.className = "event";

            const time = new Date(ev.Time).toLocaleTimeString();

            div.innerHTML = `
                <div class="meta">
                    ${time} · ${ev.Agent} · ${ev.Kind} · ${ev.Duration || ""}
                </div>
                <div>${ev.Message}</div>
            `;

            container.appendChild(div);
        }
    }

    function updateStatus(events) {
        const statusEl = document.getElementById("status");
        const last = events[events.length - 1];
        console.log(last)
        if (!last) return;

        if (last.Kind === "completed") {
            statusEl.textContent = "Completed";
            polling = false;
        } else if (last.Kind === "failed") {
            statusEl.textContent = "Failed";
            polling = false;
        } else {
            statusEl.textContent = "Running…";
        }
    }

    // Poll every 5s
    setInterval(pollEvents, 5000);
</script>

</body>
</html>
