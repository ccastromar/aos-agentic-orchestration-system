<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AOS – Task {{ .ID }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 1rem;
            background: #f5f6f8;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .event {
            background: white;
            padding: .8rem;
            border-radius: 6px;
            margin-bottom: .6rem;
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
        }

        .meta {
            font-size: .8rem;
            color: #666;
            margin-bottom: .3rem;
        }

        .back {
            display: inline-block;
            margin-bottom: 1rem;
            text-decoration: none;
            color: #1c7ed6;
        }
    </style>
</head>
<body>

<div class="container">
    <a class="back" href="/ui">&larr; Back</a>

    <h1>Task {{ .ID }}</h1>

    {{ range .Events }}
    <div class="event">
        <div class="meta">
            {{ .Time.Format "15:04:05" }} · {{ .Agent }} · {{ .Kind }} · {{ .Duration }}
        </div>
        <div>{{ .Message }}</div>
    </div>
    {{ end }}
</div>

</body>
</html>
