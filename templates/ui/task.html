<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AOS UI - Task {{ .ID }}</title>
    <link rel="stylesheet" href="/static/aos.css">

</head>
<body>
  <a href="/ui">&larr; Back</a>
  <h1>Task {{ .ID }}</h1>
  <div id="human-gate-actions" style="margin-top:20px; display:block;">
      <h3>Human Approval Required</h3>
      <button id="approveBtn">Approve</button>
      <button id="rejectBtn" style="margin-left:10px;">Reject</button>
      <p id="hg-status"></p>
  </div>

  <script>
      const params = new URLSearchParams(window.location.search);
      const taskId = params.get("id");

      async function checkGate() {
          const res = await fetch("/ui/task?id=" + taskId);
          console.log(res)
          const data = await res.json();
          if (!data || data.status === "pending") return;

          if (data.error && data.error.includes("awaiting human")) {
              document.getElementById("human-gate-actions").style.display = "block";
          }
      }

      document.getElementById("approveBtn").onclick = async () => {
          const res = await fetch(`/task/approve?id=${taskId}`);
          document.getElementById("hg-status").textContent = "Approved!";
          setTimeout(() => location.reload(), 800);
      }

      document.getElementById("rejectBtn").onclick = async () => {
          const res = await fetch(`/task/reject?id=${taskId}`);
          document.getElementById("hg-status").textContent = "Rejected.";
          setTimeout(() => location.reload(), 800);
      }

      checkGate();
  </script>

  {{ range .Events }}
    <div class="event">
      <div class="event-header">
        <div>
          <span class="pill pill-agent">{{ .Agent }}</span>
          <span class="pill pill-kind">{{ .Kind }}</span>
        </div>
        <div class="time">
          {{ .Time.Format "15:04:05" }}
          {{ if .Duration }} · {{ .Duration }}{{ end }}
        </div>
      </div>
      <div>{{ .Message }}</div>
    </div>
  {{ end }}

  {{ if not .Events }}
    <p>No events for this task.</p>
  {{ end }}
</body>
</html>
