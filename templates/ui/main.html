<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AOS Console</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: sans-serif;
            margin: 2rem;
        }
        textarea {
            width: 100%;
            height: 120px;
            margin: 1rem 0;
        }
        button {
            padding: .7rem 1.2rem;
            background: #1c7ed6;
            color: white;
            border:none;
            border-radius:4px;
            cursor: pointer;
        }
        button:hover {
            background:#1864ab;
        }
        pre {
            background: #f4f4f4;
            padding: 1rem;
            border-radius:4px;
        }
    </style>

</head>
<body>

<h1>AOS Console</h1>
<p>Authenticated user can submit tasks to AOS below.</p>

<textarea id="message" placeholder="Write your instruction to AOS..."></textarea>
<button onclick="sendAsk()">Send</button>

<h3>Response</h3>
<pre id="output"></pre>

<script>
    function ensureAuth() {
        const token = sessionStorage.getItem("aos_token");
        if (!token) {
            window.location.href = "/ui/login.html";
        }
        return token;
    }

    async function sendAsk() {
        const token = ensureAuth();
        const msg = document.getElementById("message").value.trim();
        if (!msg) {
            document.getElementById("output").innerText = "Message required.";
            return;
        }

        try {
            const res = await fetch("/ask", {
                method: "POST",
                headers: {
                    "Authorization": "Bearer " + token,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: msg })
            });

            const data = await res.json();
            document.getElementById("output").innerText = JSON.stringify(data, null, 2);

            if (res.status === 401) {
                sessionStorage.removeItem("aos_token");
                window.location.href = "/ui/login.html";
            }

        } catch (err) {
            document.getElementById("output").innerText = "Network error: " + err;
        }
    }
</script>

</body>
</html>
